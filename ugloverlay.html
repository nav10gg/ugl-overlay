<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGL Live Squad Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Russo+One&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: rgba(0, 0, 0, 0);
            margin: 0;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            /* Places the bar at the bottom center of the screen */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
            padding-bottom: 40px; 
        }

        .hidden { opacity: 0 !important; }

        /* The Main Wrapper */
        #overlay-bar {
            display: flex;
            align-items: stretch;
            height: 55px;
            filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.5)) drop-shadow(0px 0px 8px rgba(0, 212, 255, 0.4));
            transition: opacity 0.5s ease;
        }

        /* --- LOGO SECTION --- */
        .logo-box {
            background: #111;
            border: 2px solid #d1d5db;
            border-right: none;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
            z-index: 3;
        }

        #ugl-logo {
            max-height: 40px;
            object-fit: contain;
        }

        /* --- PLAYER NAMES SECTION --- */
        .players-wrapper {
            background: linear-gradient(90deg, rgba(15, 5, 30, 0.95) 0%, rgba(35, 15, 65, 0.95) 100%);
            border-top: 2px solid #d1d5db;
            border-bottom: 2px solid #d1d5db;
            display: flex;
            align-items: center;
            padding: 0 30px 0 20px;
            /* Slants the right side of the box */
            clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
            z-index: 2;
        }

        .player-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            white-space: nowrap;
        }

        .divider {
            color: #8b40b8; /* UGL Purple */
            margin: 0 12px;
            font-weight: normal;
        }

        /* --- STATS SECTION (Points & Place) --- */
        .stats-wrapper {
            display: flex;
            background: linear-gradient(135deg, #4b207f 0%, #230f41 100%);
            border: 2px solid #00d4ff; /* Neon Blue */
            margin-left: -15px; /* Tucks it under the slanted player box */
            padding-left: 15px;
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
            box-shadow: inset 0px 0px 15px rgba(0, 212, 255, 0.3);
            z-index: 1;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            min-width: 60px;
        }

        .stat-block.points {
            border-right: 2px solid rgba(0, 212, 255, 0.3);
        }

        .stat-label {
            font-family: 'Russo One', sans-serif;
            font-size: 10px;
            color: #bfa3ff;
            line-height: 1;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            text-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div id="overlay-bar" class="hidden">
        <div class="logo-box">
            <img src="https://github.com/nav10gg/ugl-overlay/blob/main/UGL_main.png?raw=true" id="ugl-logo" alt="UGL">
        </div>

        <div class="players-wrapper">
            <div class="player-text" id="team-names">LOADING PLAYERS...</div>
        </div>

        <div class="stats-wrapper">
            <div class="stat-block points">
                <span class="stat-label">POINTS</span>
                <span class="stat-value" id="team-score">0</span>
            </div>
            <div class="stat-block place">
                <span class="stat-label">PLACE</span>
                <span class="stat-value" id="team-rank">-</span>
            </div>
        </div>
    </div>

    <script>
        // --- PASTE YOUR GOOGLE SHEETS CSV LINK HERE ---
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTU2oglmE4wbIunmXgsJSDOHhBIJ5u5-I-29ThRVzcVWNIr11rShD4K0W2KrzypUoAJRsO6q5wEVYfe/pub?gid=180899896&single=true&output=csv";
        
        const urlParams = new URLSearchParams(window.location.search);
        const playerDiscordId = urlParams.get('user');

        function parseCSVRow(row) {
            return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/(^"|"$)/g, '').trim());
        }

        async function fetchLiveScore() {
            if (!playerDiscordId) return; 

            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                const rows = data.split('\n').slice(1); 
                let playerIsLive = false;

                for (let row of rows) {
                    if (!row.trim()) continue; 
                    
                    const columns = parseCSVRow(row);

                    // IDs are currently in columns 4, 5, 6, 7
                    const p1_id = columns[4] ? columns[4].replace(/'/g, '') : "";
                    const p2_id = columns[5] ? columns[5].replace(/'/g, '') : "";
                    const p3_id = columns[6] ? columns[6].replace(/'/g, '') : "";
                    const p4_id = columns[7] ? columns[7].replace(/'/g, '') : "";

                    if (playerDiscordId === p1_id || playerDiscordId === p2_id || playerDiscordId === p3_id || playerDiscordId === p4_id) {
                        
                        // Score
                        document.getElementById('team-score').innerText = columns[3] || "0";

                        // --- NEW DATA (We will hook this up to your Sheet next!) ---
                        // Right now, this tells the code to look for Names in columns 9-12, and Rank in 13.
                        // If it doesn't find them yet, it defaults to showing the Discord ID as a placeholder.
                        let teamNames = [];
                        if (columns[9]) teamNames.push(columns[9]);
                        if (columns[10]) teamNames.push(columns[10]);
                        if (teamNames.length === 0) teamNames = ["PLAYER 1", "PLAYER 2"]; // Temporary fallback

                        document.getElementById('team-names').innerHTML = teamNames.join(' <span class="divider">|</span> ');
                        document.getElementById('team-rank').innerText = columns[13] ? columns[13] + "" : "TBD";
                        
                        document.getElementById('overlay-bar').classList.remove('hidden');
                        playerIsLive = true;
                        break; 
                    }
                }

                if (!playerIsLive) {
                    document.getElementById('overlay-bar').classList.add('hidden');
                }

            } catch (error) {
                console.error("Error fetching data: ", error);
            }
        }

        fetchLiveScore();
        setInterval(fetchLiveScore, 10000); 

    </script>
</body>
</html>
